name: MegaLinter

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: megalinter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  megalinter:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Cache MegaLinter internal data
      - name: Cache MegaLinter
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache
            ~/.npm
            ~/.local
          key: megalinter-${{ runner.os }}-${{ hashFiles('.mega-linter.yml') }}
          restore-keys: |
            megalinter-${{ runner.os }}-

      - name: Run MegaLinter
        uses: oxsecurity/megalinter@v9.5.0
        env:
          DEFAULT_WORKSPACE: ${{ github.workspace }}

          # Huge performance improvement
          VALIDATE_ALL_CODEBASE: false

          # Your config
          MEGALINTER_CONFIG: .mega-linter.yml

          # Do not auto-fix
          APPLY_FIXES: none

          # Reduce git overhead
          GIT_HISTORY_DEPTH: "1"

      - name: Upload MegaLinter reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: megalinter-reports
          path: megalinter-reports
