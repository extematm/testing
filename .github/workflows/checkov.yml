name: Checkov IaC Security Scan

on:
  #push:
  #  branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: checkov-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checkov:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,kubernetes,dockerfile,github_actions,secrets
          output_format: sarif
          output_file_path: checkov.sarif
          quiet: true
          soft_fail: true
          skip_path: |
            node_modules
            dist
            build
            vendor
            .terraform
            coverage

      - name: Verify SARIF exists
        run: |
          ls -lah
          test -f checkov.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov.sarif
          category: checkov

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: checkov.sarif
