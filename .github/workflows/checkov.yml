name: checkov IaC security check

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

  schedule:
    - cron: "0 2 * * *"

  workflow_dispatch:

concurrency:
  group: checkov-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checkov:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CHECKOV_EXPERIMENTAL_TERRAFORM_MANAGED_MODULES: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: checkov
