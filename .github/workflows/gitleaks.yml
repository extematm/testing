name: Gitleaks Secrets Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------
      # Install Gitleaks (stable)
      # ----------------------------
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"

          curl -L -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz

          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # ----------------------------
      # Run scan → SARIF
      # ----------------------------
      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source . \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --exit-code 0

      # ----------------------------
      # Verify output exists (important)
      # ----------------------------
      - name: Validate SARIF output
        run: |
          ls -lah
          test -f gitleaks.sarif

      # ----------------------------
      # Upload to Security tab
      # ----------------------------
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks-secrets

      # ----------------------------
      # Artifact backup
      # ----------------------------
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-${{ github.run_number }}
          path: gitleaks.sarif
