name: Gitleaks Secrets Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read
  security-events: write

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install pinned Gitleaks
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.30.1"

          curl -sSL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz

          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/gitleaks
          chmod +x /usr/local/bin/gitleaks

          gitleaks version

      # Run scan (fail on findings)
      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source . \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --exit-code 1

      # Validate output
      - name: Validate SARIF output
        if: always()
        run: |
          test -f gitleaks.sarif
          ls -lah gitleaks.sarif

      # Upload findings
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks-secrets

      # Preserve audit artifact
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-${{ github.run_number }}
          path: gitleaks.sarif
