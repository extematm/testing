name: Gitleaks Secrets Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks (secrets scanning)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------
      # Install Gitleaks explicitly
      # ----------------------------
      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_8.18.4_linux_x64.tar.gz \
          | tar -xz
          sudo mv gitleaks /usr/local/bin/

      # ----------------------------
      # Run scan (ENSURE SARIF OUTPUT EXISTS)
      # ----------------------------
      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source . \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --exit-code 0

      # ----------------------------
      # Safety check (prevents upload crash)
      # ----------------------------
      - name: Verify SARIF exists
        run: |
          ls -lah
          test -f gitleaks.sarif || (echo "SARIF missing!" && exit 1)

      # ----------------------------
      # Upload to GitHub Security tab
      # ----------------------------
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks-secrets

      # ----------------------------
      # Artifact backup
      # ----------------------------
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-${{ github.run_number }}
          path: gitleaks.sarif
