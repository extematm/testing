name: Semgrep Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: semgrep (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    container:
      image: semgrep/semgrep:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache Semgrep
        uses: actions/cache@v5
        with:
          path: /root/.cache/semgrep
          key: semgrep-${{ runner.os }}-${{ hashFiles('**/*.yml', '**/*.yaml', '**/*.py', '**/*.js', '**/*.ts') }}

      # ----------------------------
      # Run Semgrep JSON (needed for enrichment)
      # ----------------------------
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config auto \
            --json \
            --output semgrep.json \
            --skip-unknown-extensions \
            --max-target-bytes 2000000 \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude vendor \
            --exclude .git \
            --exclude owasp_dependecy_track_docker

      # ----------------------------
      # Build SARIF with "blocking" marker
      # ----------------------------
      - name: Build SARIF (with blocking metadata)
        run: |
          jq '
          {
            version: "2.1.0",
            runs: [
              {
                tool: {
                  driver: {
                    name: "semgrep",
                    rules: []
                  }
                },
                results: [
                  .results[] |
                  {
                    ruleId: .check_id,
                    message: {
                      text:
                        (if (.extra.severity=="ERROR" and (.check_id|test("injection|rce|ssrf|auth|sql|shell"))) then
                          "[BLOCKER] " + .extra.message
                        else
                          .extra.message
                        end)
                    },
                    locations: [
                      {
                        physicalLocation: {
                          artifactLocation: {
                            uri: .path
                          },
                          region: {
                            startLine: .start.line
                          }
                        }
                      }
                    ],

                    level:
                      if (.extra.severity=="ERROR" and (.check_id|test("injection|rce|ssrf|auth|sql|shell"))) then "error"
                      elif (.extra.severity=="ERROR") then "warning"
                      else "note"
                      end,

                    properties: {
                      blocking:
                        (.extra.severity=="ERROR" and (.check_id|test("injection|rce|ssrf|auth|sql|shell")))
                    }
                  }
                ]
              }
            ]
          }' semgrep.json > semgrep.sarif

      # ----------------------------
      # Determine WHAT caused CI failure
      # ----------------------------
      - name: Show blocking findings (CI reason)
        run: |
          echo "🚨 BLOCKING FINDINGS (caused CI failure):"

          jq -r '
            .results[]
            | select(.extra.severity=="ERROR"
            and (.check_id|test("injection|rce|ssrf|auth|sql|shell")))
            | "❌ " + .check_id + " -> " + .path + ":" + (.start.line|tostring)
          ' semgrep.json

          COUNT=$(jq '[.results[] | select(.extra.severity=="ERROR" and (.check_id|test("injection|rce|ssrf|auth|sql|shell")))] | length' semgrep.json)

          echo "BLOCKING_COUNT=$COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ Pipeline failed due to BLOCKING security findings"
            exit 1
          fi

      # ----------------------------
      # Upload SARIF (GitHub Security tab)
      # ----------------------------
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-sast

      # ----------------------------
      # Artifact
      # ----------------------------
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-${{ github.run_number }}-${{ github.sha }}
          path: semgrep.sarif
