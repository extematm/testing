name: Semgrep Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: semgrep (production SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    container:
      image: semgrep/semgrep:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ----------------------------
      # Cache Semgrep engine + rules
      # ----------------------------
      - name: Cache Semgrep
        uses: actions/cache@v5
        with:
          path: /root/.cache/semgrep
          key: semgrep-${{ runner.os }}-${{ hashFiles('**/*.yml', '**/*.yaml', '**/*.py', '**/*.js', '**/*.ts') }}
          restore-keys: |
            semgrep-${{ runner.os }}-

      # ----------------------------
      # Compute PR baseline
      # ----------------------------
      - name: Compute baseline
        id: baseline
        run: |
          echo "base=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT

      # ----------------------------
      # Run Semgrep (deterministic ruleset)
      # ----------------------------
      - name: Run Semgrep scan
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --baseline-commit ${{ steps.baseline.outputs.base }} \
            --sarif \
            --output semgrep.sarif \
            --skip-unknown-extensions \
            --max-target-bytes 2000000 \
            --jobs 4 \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude vendor \
            --exclude .git \
            --exclude owasp_dependecy_track_docker

      # ----------------------------
      # Extract severity metrics (CI gating)
      # ----------------------------
      - name: Evaluate severity gate
        run: |
          CRITICAL=$(jq '[.runs[].results[]
            | select(.level == "error")] | length' semgrep.sarif)

          HIGH=$(jq '[.runs[].results[]
            | select(.level == "warning")] | length' semgrep.sarif)

          echo "CRITICAL=$CRITICAL"
          echo "HIGH=$HIGH"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "CRITICAL security issues found — blocking PR"
            exit 1
          fi

          if [ "$HIGH" -gt 25 ]; then
            echo "Too many HIGH severity issues — review required"
            exit 1
          fi

          echo "Security gate passed"

      # ----------------------------
      # Generate prioritized report
      # ----------------------------
      - name: Generate priority report
        if: always()
        run: |
          jq -r '
            .runs[].results
            | sort_by(.level)
            | reverse
            | .[]
            | "\(.level | ascii_upcase) | \(.ruleId) | \(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine)\n  → \(.message)\n"
          ' semgrep.sarif > semgrep-priority.txt

      # ----------------------------
      # Upload SARIF (GitHub Security tab)
      # ----------------------------
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-sast

      # ----------------------------
      # Upload artifacts (audit/debug)
      # ----------------------------
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-${{ github.run_number }}-${{ github.sha }}
          path: |
            semgrep.sarif
            semgrep-priority.txt
