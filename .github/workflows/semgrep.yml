name: Semgrep Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: semgrep (production gate)
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 1. Run scan (CRITICAL = failing CI gate)
      - name: Run Semgrep (fail on critical issues)
        run: |
          semgrep scan \
            --config auto \
            --sarif \
            --output semgrep.sarif \
            --severity ERROR

      # 2. Upload to GitHub Security tab
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v7
        with:
          sarif_file: semgrep.sarif

      # 3. Artifact for debugging
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-results-${{ github.run_number }}-${{ github.sha }}
          path: semgrep.sarif
