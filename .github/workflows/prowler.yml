name: Prowler IaC Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: prowler-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prowler:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    container:
      image: prowlercloud/prowler:stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # Run Prowler (explicit CLI)
      # ----------------------------
      - name: Run Prowler (IaC + SARIF)
        run: |
          mkdir -p output

          prowler \
            -p iac \
            -M sarif json-ocsf \
            -o output \
            --severity critical high

      # ----------------------------
      # Verify output exists
      # ----------------------------
      - name: Validate output
        run: |
          ls -R output
          test -d output

      # ----------------------------
      # Upload SARIF to Security tab
      # ----------------------------
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: output/*.sarif
          category: prowler-iac

      # ----------------------------
      # Artifact (debug / audit)
      # ----------------------------
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prowler-${{ github.run_number }}
          path: output/
